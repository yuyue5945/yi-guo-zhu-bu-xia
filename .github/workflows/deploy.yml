name: Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pot-game .

      - name: Save image
        run: docker save pot-game | gzip > pot-game.tar.gz

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "pot-game.tar.gz"
          target: "/tmp/"
          strip_components: 0

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /tmp
            gunzip -c pot-game.tar.gz | docker load
            docker stop pot-game 2>/dev/null || true
            docker rm pot-game 2>/dev/null || true
            docker run -d --name pot-game -p 8080:80 --restart unless-stopped pot-game
            rm -f pot-game.tar.gz
            echo "Deployed! http://${{ secrets.DEPLOY_HOST }}:8080"
